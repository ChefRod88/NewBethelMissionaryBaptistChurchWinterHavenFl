# Explicit ChurchWebsite.csproj avoids MSB1011 when multiple projects could match.
name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Build Release
        run: dotnet build ChurchWebsite.csproj --configuration Release
